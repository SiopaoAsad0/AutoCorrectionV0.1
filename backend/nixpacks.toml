[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.sqlite3", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Packages.composer"]

[phases.install]
cmds = ["composer install --no-dev --ignore-platform-reqs"]

[phases.build]
cmds = [
  "touch database/database.sqlite",
  "DB_CONNECTION=sqlite DB_DATABASE=/app/database/database.sqlite php artisan migrate --force",
  "DB_CONNECTION=sqlite DB_DATABASE=/app/database/database.sqlite php artisan db:seed --force"
]

[start]
cmd = "DB_CONNECTION=sqlite DB_DATABASE=/app/database/database.sqlite php artisan serve --host=0.0.0.0 --port=$PORT"
